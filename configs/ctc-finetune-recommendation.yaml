# Reference config from facebookresearch/omnilingual-asr
# (workflows/recipes/wav2vec2/asr/configs/ctc-finetune-recommendation.yaml) — preset suggested for
# fine-tuning a small CTC checkpoint on a low-resource language. Tuned for a multi-GPU run.
# NOTE: example_shuffle_window: 0 means "shuffle the whole dataset" and will error on a streaming
# dataset — set it > 0 if you hit that.
model:
  name: "omniASR_CTC_300M" # omniASR_CTC_1B, omniASR_CTC_3B
dataset:
  name: "example_dataset"
  train_split: "train"
  valid_split: "dev"
  storage_mode: "MIXTURE_PARQUET"
  task_mode: "ASR"
  mixture_parquet_storage_config:
    dataset_summary_path: "/path/to/your/dataset/language_distribution_0.tsv"
    beta_corpus: 0.5
    beta_language: 0.5
    fragment_loading:
      cache: True
  asr_task_config:
     max_audio_len: 960_000
     max_num_elements: 7_680_000 # maximum of eight 60s samples, or more samples at lower lengths
     batch_shuffle_window: 1
     normalize_audio: true
     example_shuffle_window: 0 # full-batch shuffling by default
tokenizer:
  name: "omniASR_tokenizer_v1"
optimizer:
  config:
    lr: 1e-05
trainer:
  freeze_encoder_for_n_steps: 0
  mixed_precision:
    dtype: "torch.bfloat16"
  grad_accumulation:
    num_batches: 1 # tune this parameter if you are getting OOM; we use 32 GPUs for 300M, 64 for 1B, 96 for 3B
regime:
  num_steps: 5_000
  validate_every_n_steps: 500
  validate_after_n_steps: 500
  checkpoint_every_n_steps: 500
  checkpoint_after_n_steps: 500
  publish_metrics_every_n_steps: 500
  publish_metrics_after_n_steps: 500
